name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries
        shell: bash
        run: |
          # Set binary extension based on OS
          EXE_EXT=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXE_EXT=".exe"
          fi
          
          # Create archive directory
          ARCHIVE_DIR="release-${{ matrix.artifact_name }}"
          mkdir -p "$ARCHIVE_DIR"
          
          # Move binaries from target folder
          cp "target/${{ matrix.target }}/release/ppdrive${EXE_EXT}" "$ARCHIVE_DIR/"
          cp "target/${{ matrix.target }}/release/server${EXE_EXT}" "$ARCHIVE_DIR/"
          
          # Compress assets
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell Compress-Archive -Path "$ARCHIVE_DIR" -DestinationPath "${ARCHIVE_DIR}.zip"
          else
            tar -czf "${ARCHIVE_DIR}.tar.gz" "$ARCHIVE_DIR"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-${{ matrix.artifact_name }}.tar.gz
            release-${{ matrix.artifact_name }}.zip
